name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gitdeep
          POSTGRES_PASSWORD: gitdeep_password
          POSTGRES_DB: gitdeep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest -q
        env:
          TEST_DATABASE_URL: postgresql+psycopg://gitdeep:gitdeep_password@localhost:5432/gitdeep_test
          DATABASE_URL: postgresql+psycopg://gitdeep:gitdeep_password@localhost:5432/gitdeep_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret
          REFRESH_SECRET_KEY: ci-test-refresh-secret
          EMAIL_LINK_SECRET: ci-test-email-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
