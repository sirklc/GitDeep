<!DOCTYPE html>
<html lang="en">
<body style="font-family: Arial, sans-serif; background: #f6f5fb; margin: 0; padding: 24px;">
  <div style="max-width: 560px; margin: auto; background: #fff; border-radius: 12px; padding: 32px; border: 1px solid #e5e1f5;">
    <div style="color: #8b5cf6; font-weight: bold; letter-spacing: 1px;">GITDEEP</div>
    <h1 style="font-size: 20px; margin: 12px 0;">Your report for {{ repo_name }} is ready</h1>
    <div style="background: #f4f0fe; border-radius: 10px; padding: 16px; text-align: center; margin: 20px 0;">
      <span style="font-size: 32px; font-weight: bold; color: #7c3aed;">{{ overall_score }}/100</span>
    </div>
    <p style="color: #444;">Top recommendations:</p>
    <ol style="color: #444;">
      {% for rec in recommendations %}<li style="margin-bottom: 6px;">{{ rec }}</li>{% endfor %}
    </ol>
    <a href="{{ report_url }}" style="display: inline-block; margin-top: 16px; background: #8b5cf6; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 8px; font-weight: bold;">View report</a>
    <p style="color: #999; font-size: 12px; margin-top: 24px;">The PDF report is attached to this email.</p>
  </div>
</body>
</html>
